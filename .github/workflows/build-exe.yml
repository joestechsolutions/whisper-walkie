name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: WhisperWalkie-windows
            zip_cmd: Compress-Archive -Path dist/WhisperWalkie -DestinationPath dist/WhisperWalkie-windows.zip
            zip_shell: pwsh
            zip_path: dist/WhisperWalkie-windows.zip
          - os: macos-latest
            artifact: WhisperWalkie-macos
            zip_cmd: cd dist && zip -r WhisperWalkie-macos.zip WhisperWalkie/
            zip_shell: bash
            zip_path: dist/WhisperWalkie-macos.zip
          - os: ubuntu-latest
            artifact: WhisperWalkie-linux
            zip_cmd: cd dist && tar czf WhisperWalkie-linux.tar.gz WhisperWalkie/
            zip_shell: bash
            zip_path: dist/WhisperWalkie-linux.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Linux needs system deps for pynput (X11) and sounddevice (PortAudio).
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libxtst-dev libx11-dev portaudio19-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Pre-download the Whisper base model so it's bundled into the build.
      # Users never need to download anything — it works offline.
      - name: Download Whisper base model
        run: python -c "from faster_whisper.utils import download_model; download_model('base', output_dir='./faster-whisper-base')"

      - name: Build with PyInstaller
        run: pyinstaller WhisperWalkie.spec

      - name: Package release
        run: ${{ matrix.zip_cmd }}
        shell: ${{ matrix.zip_shell }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: ${{ matrix.zip_path }}
          if-no-files-found: error

      # Attach to the GitHub Release created by the tag.
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.zip_path }}
