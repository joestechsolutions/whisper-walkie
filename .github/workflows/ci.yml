name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # faster-whisper requires ctranslate2 which needs system libs that are
      # unavailable in standard CI runners. sounddevice needs PortAudio.
      # We attempt a full install first and fall back to the lightweight subset
      # that is sufficient for import and syntax checks.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install flet==0.82.2 pynput requests numpy scipy pyperclip

      # Linux needs a virtual display for pynput (XRecord) and Flet (Flutter/GTK).
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libxtst-dev \
            libx11-dev \
            xdotool

      - name: Syntax check — main.py
        run: python -c "import py_compile; py_compile.compile('main.py', doraise=True)"

      - name: Syntax check — platform_backend
        run: |
          python -c "import py_compile; py_compile.compile('platform_backend/__init__.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('platform_backend/base.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('platform_backend/windows.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('platform_backend/macos.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('platform_backend/linux.py', doraise=True)"

      # Windows: backend loads natively, no special setup needed.
      - name: Verify platform backend loads (Windows)
        if: runner.os == 'Windows'
        run: python -c "from platform_backend import get_backend; print(type(get_backend()))"

      # Linux: pynput needs a running X server (XRecord), so use xvfb-run.
      - name: Verify platform backend loads (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run python -c "from platform_backend import get_backend; print(type(get_backend()))"

      # macOS: pynput requires Accessibility permissions (TCC) which CI runners
      # cannot grant. Syntax checks above verify the code is valid; skip the
      # import test to avoid a guaranteed TCC failure.
      - name: Verify platform backend loads (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Skipped — macOS CI runners cannot grant Accessibility permissions for pynput."
          echo "Syntax checks passed; backend code is valid."

      - name: Install pytest
        run: pip install pytest --quiet

      # Run the full test suite. On Linux, pynput needs an X display.
      - name: Run tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: pytest tests/ -v --tb=short

      - name: Run tests (Linux — xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run pytest tests/ -v --tb=short

      # Scan dependencies for known CVEs (runs once per OS, not critical path).
      # --ignore-vuln skips CVEs with no upstream fix in transitive deps.
      # Remove the ignore flag once pygments ships a patched release.
      - name: Dependency vulnerability scan
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          pip install pip-audit --quiet
          pip-audit -r requirements.txt --ignore-vuln CVE-2026-4539
