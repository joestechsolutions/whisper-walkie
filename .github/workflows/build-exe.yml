name: Build Windows EXE

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: PyInstaller — Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # WhisperWalkie.spec references icon.ico — it must exist at build time.
      # The spec also bundles faster_whisper, flet, sounddevice, and scipy via
      # collect_all(), so the full requirements install above is required.
      - name: Build EXE
        run: pyinstaller WhisperWalkie.spec

      # Upload the single-file EXE produced in dist/.
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperWalkie-${{ github.ref_name }}-windows
          path: dist/WhisperWalkie.exe
          if-no-files-found: error

      # Attach the EXE to the GitHub Release that the tag created.
      - name: Upload EXE to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WhisperWalkie.exe
