name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: WhisperWalkie-windows
          - os: macos-latest
            artifact: WhisperWalkie-macos
          - os: ubuntu-latest
            artifact: WhisperWalkie-linux

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      # Linux needs system deps for pynput (X11) and sounddevice (PortAudio).
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libxtst-dev libx11-dev portaudio19-dev

      # NSIS is available on GitHub-hosted Windows runners via Chocolatey.
      # Installing here rather than using a pre-installed version ensures we
      # always have a known version regardless of runner image updates.
      - name: Install NSIS (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Pre-download the Whisper base model so it's bundled into the build.
      # Users never need to download anything — it works offline.
      - name: Download Whisper base model
        run: python -c "from faster_whisper.utils import download_model; download_model('base', output_dir='./faster-whisper-base')"

      - name: Build with PyInstaller
        run: pyinstaller WhisperWalkie.spec

      # -----------------------------------------------------------------------
      # Package: zip / tar.gz (all platforms)
      # -----------------------------------------------------------------------
      - name: Package release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/WhisperWalkie -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Package release (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ${{ matrix.artifact }}.zip WhisperWalkie/

      - name: Package release (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar czf ${{ matrix.artifact }}.tar.gz WhisperWalkie/

      # -----------------------------------------------------------------------
      # Build NSIS installer (Windows only)
      #
      # APP_VERSION strips the leading "v" from the tag (e.g. v1.2.3 -> 1.2.3)
      # so VIProductVersion in installer.nsi stays in W.X.Y.Z format.
      # The tag comes from push.tags (v*) — it is owner-controlled and not
      # user-supplied input, but we still use an env var for best practice.
      # makensis is on PATH after the choco install step above.
      # -----------------------------------------------------------------------
      - name: Build NSIS installer (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          $version = $env:GIT_TAG -replace '^v', ''
          makensis /DAPP_VERSION=$version installer.nsi

      # -----------------------------------------------------------------------
      # Upload artifacts (for download from the Actions run page)
      # -----------------------------------------------------------------------
      - name: Upload artifact (zip)
        if: runner.os == 'Windows' || runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: dist/${{ matrix.artifact }}.zip
          if-no-files-found: error

      - name: Upload artifact (installer)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ matrix.artifact }}-installer-${{ github.ref_name }}
          path: dist/WhisperWalkie-Setup.exe
          if-no-files-found: error

      - name: Upload artifact (tar.gz)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Attach files to the GitHub Release created by the tag push.
      # Windows attaches both the zip (portable) and the NSIS installer.
      # -----------------------------------------------------------------------
      - name: Upload to release (zip)
        if: runner.os == 'Windows' || runner.os == 'macOS'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          files: dist/${{ matrix.artifact }}.zip

      - name: Upload to release (installer)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          files: dist/WhisperWalkie-Setup.exe

      - name: Upload to release (tar.gz)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          files: dist/${{ matrix.artifact }}.tar.gz
